<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16A085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ov" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.4);stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#ov)"/>
  <circle cx="650" cy="150" r="120" fill="rgba(255,255,255,0.06)"/>
  <circle cx="100" cy="500" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="400" cy="300" r="200" fill="rgba(255,255,255,0.03)"/>
  <!-- Mountain/hill silhouette -->
  <path d="M0 450 Q100 350 200 420 Q300 300 400 380 Q500 280 600 360 Q700 320 800 400 L800 600 L0 600 Z" fill="rgba(0,0,0,0.15)"/>
  <text x="400" y="280" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">张家界</text>
  <text x="400" y="330" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">Trip 旅行攻略</text>
  <line x1="320" y1="355" x2="480" y2="355" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
