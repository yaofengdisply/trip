<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Trip - 中国十大热门旅行景点攻略网站，提供故宫、长城、西湖、黄山等景点详细攻略信息。">
  <title>Trip - 中国旅行攻略</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Trip
      </a>
      <div class="nav-links">
        <a href="index.html" class="active">首页</a>
        <a href="index.html">景点列表</a>
        <a href="#about">关于</a>
      </div>
    </div>
  </nav>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="container">
        <h1>探索中国，发现美好</h1>
        <p>精选十大热门旅行景点，提供最详实的攻略信息，让你的每一次旅行都精彩纷呈</p>
      </div>
    </section>

    <!-- Search & Filter -->
    <section class="filter-bar">
      <div class="container">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="搜索景点名称、城市或类型..." autocomplete="off">
        </div>
        <div class="filter-tags">
          <span class="filter-tag" data-filter="历史文化">🏛 历史文化</span>
          <span class="filter-tag" data-filter="自然风光">🏔 自然风光</span>
          <span class="filter-tag" data-filter="世界遗产">🗺 世界遗产</span>
          <span class="filter-tag" data-filter="古城古镇">🏘 古城古镇</span>
          <span class="filter-tag" data-filter="海岛文艺">🏖 海岛文艺</span>
        </div>
      </div>
    </section>

    <!-- Spot Grid -->
    <section class="spot-grid-section">
      <div class="container">
        <h2 class="section-title"><span class="highlight">十大热门</span>旅行景点</h2>
        <div class="spot-grid"></div>
      </div>
    </section>

    <!-- About -->
    <section id="about" class="about-page" style="padding-top:0">
      <div class="container">
        <h2 class="section-title">关于 <span class="highlight">Trip</span></h2>
        <p>Trip 是一个专注于中国热门旅行景点的攻略网站。我们精选了十大最受欢迎的旅游目的地，提供从交通、路线、美食到住宿的全方位攻略信息，帮助你规划完美的旅行。</p>
        <p>所有数据均为人工整理，力求准确可靠。如果你发现任何信息需要更新，欢迎联系我们。</p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>Trip 旅行攻略 &copy; 2026 | 探索中国，发现美好</p>
      <p style="margin-top:4px;font-size:0.8rem;opacity:0.6">数据仅供参考，以景区实际公告为准</p>
    </div>
  </footer>

  <!-- Back to Top -->
  <button id="backToTop" class="back-to-top" aria-label="返回顶部">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
